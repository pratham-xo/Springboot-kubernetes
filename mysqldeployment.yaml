apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:
      - name: mysql
        image: mysql:5.7
        args:
          - --default-authentication-plugin=mysql_native_password

        env:
        - name: MYSQL_ROOT_PASSWORD
          value: root123

        - name: MYSQL_DATABASE
          value: employee_db

        ports:
        - containerPort: 3306

        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql

      volumes:
      - name: mysql-storage
        persistentVolumeClaim:
          claimName: db-pvc
